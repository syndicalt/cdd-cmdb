name: Validate Spec

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff
      - run: ruff check suites/ harness/ generator/ conftest.py

  test-spec:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        profile: [minimal, standard, enterprise]

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install spec dependencies
        run: pip install -e ".[generator]"

      - name: Generate CMDB server
        run: |
          python -m generator \
            --profile ${{ matrix.profile }} \
            --output ./ci-server \
            --port 9090 \
            --max-iterations 3 \
            --no-cache

      - name: Start generated server
        run: |
          cd ci-server
          python -m venv .venv
          .venv/bin/pip install -q -r requirements.txt
          PORT=9090 .venv/bin/python app.py &
          # Wait for health
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9090/health > /dev/null 2>&1; then
              echo "Server healthy"
              break
            fi
            sleep 1
          done

      - name: Run ${{ matrix.profile }} profile
        env:
          CMDB_BASE_URL: http://localhost:9090
          HYPOTHESIS_PROFILE: ci
        run: pytest -c profiles/${{ matrix.profile }}.ini --tb=short -q
