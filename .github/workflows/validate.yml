name: Validate Spec

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff
      - run: ruff check suites/ harness/ generator/ conftest.py

  test-spec:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: minimal
            testpaths: suites/core
          - profile: standard
            testpaths: suites/core suites/discovery suites/audit suites/graph suites/search suites/diff suites/reconciliation suites/tags suites/ttl suites/webhooks

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e .

      - name: Start reference server
        run: |
          PORT=9090 python reference/app.py &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9090/health > /dev/null 2>&1; then
              echo "Server healthy"
              break
            fi
            sleep 1
          done

      - name: Run ${{ matrix.profile }} profile tests
        env:
          CMDB_BASE_URL: http://localhost:9090
          HYPOTHESIS_PROFILE: ci
        run: |
          python -m pytest ${{ matrix.testpaths }} \
            --tb=short -q
