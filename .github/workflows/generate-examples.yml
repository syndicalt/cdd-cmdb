name: Generate Examples

# Run when specs/tests/harness change, or manually
on:
  push:
    branches: [master]
    paths:
      - 'specs/**'
      - 'suites/**'
      - 'harness/**'
      - 'conftest.py'
      - 'profiles/**'
      - 'generator/**'
  workflow_dispatch:
    inputs:
      profile:
        description: 'Profile to generate (all = minimal + standard)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - minimal
          - standard
      backend:
        description: 'Backend to generate (all = fastapi + flask)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - python/fastapi/sqlite
          - python/flask/sqlite

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: minimal
            backend: python/fastapi/sqlite
            dir: minimal-fastapi
            max_iters: 5
          - profile: minimal
            backend: python/flask/sqlite
            dir: minimal-flask
            max_iters: 5
          - profile: standard
            backend: python/fastapi/sqlite
            dir: standard-fastapi
            max_iters: 8

    # Skip matrix entries that don't match workflow_dispatch inputs
    # (when triggered by push, all entries run)
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Check if this matrix entry should run
        id: should-run
        run: |
          INPUT_PROFILE="${{ github.event.inputs.profile || 'all' }}"
          INPUT_BACKEND="${{ github.event.inputs.backend || 'all' }}"
          if [[ "$INPUT_PROFILE" != "all" && "$INPUT_PROFILE" != "${{ matrix.profile }}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          elif [[ "$INPUT_BACKEND" != "all" && "$INPUT_BACKEND" != "${{ matrix.backend }}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v5
        if: steps.should-run.outputs.skip != 'true'

      - uses: actions/setup-python@v5
        if: steps.should-run.outputs.skip != 'true'
        with:
          python-version: '3.12'

      - name: Install spec dependencies
        if: steps.should-run.outputs.skip != 'true'
        run: pip install -e ".[generator]"

      - name: Generate ${{ matrix.profile }} / ${{ matrix.backend }}
        if: steps.should-run.outputs.skip != 'true'
        run: |
          python -m generator \
            --profile ${{ matrix.profile }} \
            --backend "${{ matrix.backend }}" \
            --output examples/${{ matrix.dir }} \
            --port 9090 \
            --max-iterations ${{ matrix.max_iters }} \
            --badge \
            --badge-dir examples/${{ matrix.dir }}

      - name: Add example metadata
        if: steps.should-run.outputs.skip != 'true'
        run: |
          cat > examples/${{ matrix.dir }}/README.md << 'HEREDOC'
          # ${{ matrix.dir }}

          > Auto-generated CMDB implementation — **${{ matrix.profile }}** profile, **${{ matrix.backend }}** backend.

          This code was generated by an LLM from the [cdd-cmdb](https://github.com/syndicalt/cdd-cmdb) test specification.
          It is not hand-written. Regenerate it anytime by running:

          ```bash
          python -m generator --profile ${{ matrix.profile }} --backend "${{ matrix.backend }}"
          ```

          ## Run it

          ```bash
          python -m venv .venv && source .venv/bin/activate
          pip install -r requirements.txt
          python app.py
          ```

          ## Validate it

          ```bash
          cd ../..  # back to repo root
          CMDB_BASE_URL=http://localhost:8080 pytest -c profiles/${{ matrix.profile }}.ini
          ```

          ---
          *Generated on $(date -u +%Y-%m-%dT%H:%M:%SZ) by [cdd-cmdb generator](https://github.com/syndicalt/cdd-cmdb)*
          HEREDOC

      - name: Upload example artifact
        if: steps.should-run.outputs.skip != 'true'
        uses: actions/upload-artifact@v5
        with:
          name: example-${{ matrix.dir }}
          path: examples/${{ matrix.dir }}
          retention-days: 90

  # After all examples generate, commit them to the examples branch
  publish:
    needs: generate
    runs-on: ubuntu-latest
    if: always() && !cancelled()

    steps:
      - uses: actions/checkout@v5
        with:
          ref: master

      - name: Download all example artifacts
        uses: actions/download-artifact@v5
        with:
          path: examples
          pattern: example-*
          merge-multiple: false

      - name: Rearrange downloaded artifacts
        run: |
          # download-artifact puts each artifact in a subdirectory named after the artifact
          # Move contents up: examples/example-minimal-fastapi/* -> examples/minimal-fastapi/*
          cd examples
          for dir in example-*/; do
            target="${dir#example-}"
            target="${target%/}"
            if [ -d "$dir" ]; then
              mkdir -p "$target"
              cp -r "$dir"* "$target/" 2>/dev/null || true
              rm -rf "$dir"
            fi
          done

      - name: Commit and push to examples branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create or switch to examples branch
          git checkout examples 2>/dev/null || git checkout --orphan examples

          # Clean the branch (keep only examples/)
          git rm -rf --cached . 2>/dev/null || true
          rm -rf suites/ harness/ generator/ specs/ profiles/ docs/ 2>/dev/null || true

          # Add a root README
          cat > README.md << 'EOF'
          # CDD-CMDB Generated Examples

          Auto-generated CMDB implementations produced by the [cdd-cmdb](https://github.com/syndicalt/cdd-cmdb) test specification.

          Each directory contains a standalone server that passes its corresponding compliance profile.
          These are **not hand-written** — they were generated by an LLM from the test suite.

          | Directory | Profile | Backend | Badge |
          |-----------|---------|---------|-------|
          | [minimal-fastapi](./minimal-fastapi) | minimal | python/fastapi/sqlite | ![badge](./minimal-fastapi/badge-minimal.svg) |
          | [minimal-flask](./minimal-flask) | minimal | python/flask/sqlite | ![badge](./minimal-flask/badge-minimal.svg) |
          | [standard-fastapi](./standard-fastapi) | standard | python/fastapi/sqlite | ![badge](./standard-fastapi/badge-standard.svg) |

          ## Regenerate

          ```bash
          git clone https://github.com/syndicalt/cdd-cmdb.git && cd cdd-cmdb
          pip install -e ".[generator]"
          export ANTHROPIC_API_KEY=sk-ant-...
          python -m generator --profile minimal --badge
          ```

          ---
          *Last updated: $(date -u +%Y-%m-%dT%H:%M:%SZ)*
          EOF

          # Stage and commit
          git add README.md examples/ 2>/dev/null || true
          git add -f examples/ 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update generated examples ($(date -u +%Y-%m-%d))"
            git push --force-with-lease origin examples
          fi
