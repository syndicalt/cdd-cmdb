name: Generate Examples

# Run when specs/tests/harness change, or manually
on:
  push:
    branches: [master]
    paths:
      - 'specs/**'
      - 'suites/**'
      - 'harness/**'
      - 'conftest.py'
      - 'profiles/**'
      - 'generator/**'
  workflow_dispatch:
    inputs:
      profile:
        description: 'Profile to generate (all = minimal + standard)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - minimal
          - standard
      backend:
        description: 'Backend to generate (all = fastapi + flask)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - python/fastapi/sqlite
          - python/flask/sqlite

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: minimal
            backend: python/fastapi/sqlite
            dir: minimal-fastapi
            max_iters: 5
          - profile: minimal
            backend: python/flask/sqlite
            dir: minimal-flask
            max_iters: 5
          - profile: standard
            backend: python/fastapi/sqlite
            dir: standard-fastapi
            max_iters: 5

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Check if this matrix entry should run
        id: should-run
        run: |
          INPUT_PROFILE="${{ github.event.inputs.profile || 'all' }}"
          INPUT_BACKEND="${{ github.event.inputs.backend || 'all' }}"
          if [[ "$INPUT_PROFILE" != "all" && "$INPUT_PROFILE" != "${{ matrix.profile }}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          elif [[ "$INPUT_BACKEND" != "all" && "$INPUT_BACKEND" != "${{ matrix.backend }}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v5
        if: steps.should-run.outputs.skip != 'true'

      - uses: actions/setup-python@v5
        if: steps.should-run.outputs.skip != 'true'
        with:
          python-version: '3.12'

      - name: Install spec dependencies
        if: steps.should-run.outputs.skip != 'true'
        run: pip install -e ".[generator]"

      - name: Generate ${{ matrix.profile }} / ${{ matrix.backend }}
        if: steps.should-run.outputs.skip != 'true'
        run: |
          python -m generator \
            --profile ${{ matrix.profile }} \
            --backend "${{ matrix.backend }}" \
            --output examples/${{ matrix.dir }} \
            --port 9090 \
            --max-iterations ${{ matrix.max_iters }} \
            --badge \
            --badge-dir examples/${{ matrix.dir }}

      - name: Add example metadata
        if: steps.should-run.outputs.skip != 'true'
        run: |
          cat > examples/${{ matrix.dir }}/README.md << EOF
          # ${{ matrix.dir }}

          > Auto-generated CMDB implementation — **${{ matrix.profile }}** profile, **${{ matrix.backend }}** backend.

          This code was generated by an LLM from the [cdd-cmdb](https://github.com/syndicalt/cdd-cmdb) test specification.
          It is not hand-written. Regenerate it anytime by running:

          \`\`\`bash
          python -m generator --profile ${{ matrix.profile }} --backend "${{ matrix.backend }}"
          \`\`\`

          ## Run it

          \`\`\`bash
          python -m venv .venv && source .venv/bin/activate
          pip install -r requirements.txt
          python app.py
          \`\`\`

          ## Validate it

          \`\`\`bash
          cd ../..  # back to repo root
          CMDB_BASE_URL=http://localhost:8080 pytest -c profiles/${{ matrix.profile }}.ini
          \`\`\`

          ---
          *Generated on $(date -u +%Y-%m-%dT%H:%M:%SZ) by [cdd-cmdb generator](https://github.com/syndicalt/cdd-cmdb)*
          EOF

      - name: Upload example artifact
        if: steps.should-run.outputs.skip != 'true'
        uses: actions/upload-artifact@v5
        with:
          name: example-${{ matrix.dir }}
          path: examples/${{ matrix.dir }}
          retention-days: 90

  # Publish whatever examples succeeded to the examples branch
  publish:
    needs: generate
    runs-on: ubuntu-latest
    # Run if at least one generate job succeeded (not if all cancelled)
    if: ${{ !cancelled() && contains(needs.generate.result, 'success') || needs.generate.result == 'success' }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all example artifacts
        uses: actions/download-artifact@v5
        with:
          path: downloaded-examples
          pattern: example-*
          merge-multiple: false

      - name: Prepare examples directory
        run: |
          mkdir -p examples
          cd downloaded-examples
          for dir in example-*/; do
            target="${dir#example-}"
            target="${target%/}"
            if [ -d "$dir" ]; then
              cp -r "$dir" "../examples/$target"
            fi
          done
          cd ..
          echo "Examples prepared:"
          ls -la examples/

      - name: Create or update examples branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Check if examples branch exists on remote
          if git ls-remote --heads origin examples | grep -q examples; then
            git fetch origin examples
            git checkout examples
            # Remove old examples, keep fresh ones
            git rm -rf examples/ 2>/dev/null || true
          else
            git checkout --orphan examples
            git reset --hard
          fi

          # Move examples into place
          cp -r "$GITHUB_WORKSPACE/downloaded-examples" /tmp/dl-examples
          # Re-checkout so we have clean state
          if git ls-remote --heads origin examples | grep -q examples; then
            git checkout examples
          fi

          mkdir -p examples
          cd /tmp/dl-examples
          for dir in example-*/; do
            target="${dir#example-}"
            target="${target%/}"
            if [ -d "$dir" ]; then
              rm -rf "$GITHUB_WORKSPACE/examples/$target"
              cp -r "$dir" "$GITHUB_WORKSPACE/examples/$target"
            fi
          done
          cd "$GITHUB_WORKSPACE"

          # Write root README
          cat > README.md << 'READMEEOF'
          # CDD-CMDB Generated Examples

          Auto-generated CMDB implementations produced by the [cdd-cmdb](https://github.com/syndicalt/cdd-cmdb) test specification.

          Each directory contains a standalone server that passes its corresponding compliance profile.
          These are **not hand-written** — they were generated by an LLM from the test suite.

          | Directory | Profile | Backend |
          |-----------|---------|---------|
          | [minimal-fastapi](./examples/minimal-fastapi) | minimal | python/fastapi/sqlite |
          | [minimal-flask](./examples/minimal-flask) | minimal | python/flask/sqlite |
          | [standard-fastapi](./examples/standard-fastapi) | standard | python/fastapi/sqlite |

          ## Regenerate

          ```bash
          git clone https://github.com/syndicalt/cdd-cmdb.git && cd cdd-cmdb
          pip install -e ".[generator]"
          export ANTHROPIC_API_KEY=sk-ant-...
          python -m generator --profile minimal --badge
          ```
          READMEEOF

          git add README.md examples/

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update generated examples ($(date -u +%Y-%m-%d))"
            git push origin examples --force
          fi
